<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Macro Conditions Monitor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="logo">M</div>
    <div class="title">
      <h1>Macro Conditions</h1>
      <p>Precious Metals Regime Monitor</p>
    </div>
    <div class="controls">
      <button id="theme-toggle" title="Toggle theme">🌙</button>
      <button id="settings-toggle" title="Settings">⚙</button>
    </div>
  </header>

  <div class="quick-stats" id="quick-stats"></div>

  <main id="main-content">
    <div id="loading">
      <div class="spinner"></div>
      <p>Loading data...</p>
    </div>
  </main>

  <div id="info-sheet">
    <button class="close-btn" onclick="closeInfo()">&times;</button>
    <h4 id="info-title"></h4>
    <p id="info-body"></p>
  </div>

  <div id="settings-overlay">
    <div class="settings-panel">
      <h3>Settings</h3>
      <label>Refresh interval (min): <input type="number" id="refresh-interval" min="1" max="60" value="5"></label>
      <button id="reset-storage">Reset localStorage</button>
      <button id="close-settings">Close</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
